name: Hermes OCI runtime-slim

on:
  pull_request:
    paths:
      - "runtimes/hermes-base/**"
      - "scripts/**"
      - "vendor/hermes-agent/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/hermes-oci.yml"
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  policy-and-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install policy check
        run: bash scripts/check-hermes-install-policy.sh

      - name: Unit tests (not integration)
        run: |
          uv sync --all-packages
          uv run pytest runtimes/hermes-base/tests -q -m "not integration"

  docker-slim:
    runs-on: ubuntu-latest
    needs: policy-and-unit
    steps:
      - uses: actions/checkout@v4

      - uses: actions/checkout@v4
        with:
          repository: yoosungung/agent-runtime
          ref: main
          path: _agents_runtime

      - name: Stage runtime-common
        env:
          RUNTIME_COMMON_SRC: _agents_runtime/packages/common
        run: bash scripts/stage-docker-build.sh

      - uses: docker/setup-buildx-action@v3

      - name: Build hermes-base image
        env:
          GIT_SHA: ${{ github.sha }}
          HERMES_REVISION: ci
        run: |
          docker build \
            --build-arg GIT_SHA="$GIT_SHA" \
            --build-arg HERMES_REVISION="$HERMES_REVISION" \
            -f runtimes/hermes-base/Dockerfile \
            -t hermes-base:ci \
            .

      - name: Image size gate
        env:
          HERMES_IMAGE_MAX_MIB: "1200"
        run: bash scripts/check-hermes-image-size.sh hermes-base:ci

      - name: Clean staged packages
        if: always()
        run: bash scripts/stage-docker-build.sh --clean
